<div class="landing app-shell">
  <header class="site-header" [class.scrolled]="headerScrolled" role="banner">
    <p class="apertura-banner" role="status">
      <span class="apertura-banner-viewport">
        <span class="apertura-banner-track">
          <span class="apertura-banner-seg">
            <span class="apertura-banner-label">Apertura</span>
            <span class="apertura-banner-date">17 de abril</span>
            <span class="apertura-banner-sep" aria-hidden="true">·</span>
            <span class="apertura-banner-turno">turno mañana</span>
          </span>
          <span class="apertura-banner-seg" aria-hidden="true">
            <span class="apertura-banner-label">Apertura</span>
            <span class="apertura-banner-date">17 de abril</span>
            <span class="apertura-banner-sep" aria-hidden="true">·</span>
            <span class="apertura-banner-turno">turno mañana</span>
          </span>
        </span>
      </span>
    </p>
    <div class="header-inner">
      <a class="logo" href="/" (click)="goToSection('inicio', $event)" aria-label="ZONA 3 — Inicio">
        <img
          class="logo-img"
          src="logo-z3-modified.png"
          width="96"
          height="96"
          alt=""
          decoding="async"
        />
        <span class="logo-wordmark">ZONA <span class="logo-mark">3</span></span>
      </a>

      <nav class="nav-desktop" aria-label="Principal">
        <a href="#inicio" (click)="goToSection('inicio', $event)">Inicio</a>
        <a href="#sobre-nosotros" (click)="goToSection('sobre-nosotros', $event)">Sobre nosotros</a>
        <a href="#puntos-z3" (click)="goToSection('puntos-z3', $event)">Puntos Z3</a>
        <a routerLink="/precios" (click)="closeMenu()">Precios</a>
      </nav>

      <button
        type="button"
        class="menu-toggle"
        [attr.aria-expanded]="menuOpen"
        aria-controls="nav-mobile"
        (click)="toggleMenu()"
      >
        <span class="sr-only">Abrir menú</span>
        <span class="menu-bar" [class.open]="menuOpen"></span>
      </button>
    </div>

    <nav
      id="nav-mobile"
      class="nav-mobile"
      [class.open]="menuOpen"
      aria-label="Móvil"
      [attr.aria-hidden]="!menuOpen"
    >
      <a href="#inicio" (click)="goToSection('inicio', $event)">Inicio</a>
      <a href="#sobre-nosotros" (click)="goToSection('sobre-nosotros', $event)">Sobre nosotros</a>
      <a href="#puntos-z3" (click)="goToSection('puntos-z3', $event)">Puntos Z3</a>
      <a routerLink="/precios" (click)="closeMenu()">Precios</a>
    </nav>
  </header>

  <main class="shell-main">
    <router-outlet />
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <div class="footer-brand">
        <img
          class="footer-logo-img"
          src="logo-z3-modified.png"
          width="96"
          height="96"
          alt=""
          decoding="async"
        />
        <div class="footer-brand-text">
          <span class="footer-logo">ZONA <span>3</span></span>
          <p>Combos</p>
        </div>
      </div>
      <div class="footer-links">
        <a href="#inicio" (click)="goToSection('inicio', $event)">Inicio</a>
        <a href="#sobre-nosotros" (click)="goToSection('sobre-nosotros', $event)">Sobre nosotros</a>
        <a href="#puntos-z3" (click)="goToSection('puntos-z3', $event)">Puntos Z3</a>
        <a routerLink="/precios" (click)="closeMenu()">Precios</a>
      </div>
      <p class="footer-copy">© {{ currentYear }} ZONA 3. Todos los derechos reservados.</p>
    </div>
  </footer>
</div>
